name: Build ImmortalWrt Sprinter Final

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Deps
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gettext git \
            libncurses5-dev libssl-dev python3 python3-setuptools python3-pyelftools \
            python-is-python3 rsync unzip zlib1g-dev libsnmp-dev liblzma-dev libpam0g-dev

      - name: Clone source
        run: |
          git clone --depth 1 https://github.com/hanwckf/immortalwrt-mt798x source
          cd source
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Auto-Detect and Verify Config
        run: |
          cd source
          rm -f .config
          
          # 1. Определяем подтаргет (mt7981 или filogic)
          SUBTARGET=$(ls target/linux/mediatek/ | grep -E 'mt7981|filogic' | head -n 1)
          echo "Detected subtarget: $SUBTARGET"
          
          # 2. Ищем точное имя устройства для KN-3810
          DEVICE_NAME=$(grep -r "Device/keenetic_kn-3810" target/linux/mediatek/image/ | head -n 1 | cut -d/ -f2 | awk '{print $1}')
          echo "Detected device name: $DEVICE_NAME"
          
          # 3. Формируем конфиг
          echo "CONFIG_TARGET_mediatek=y" >> .config
          echo "CONFIG_TARGET_mediatek_$SUBTARGET=y" >> .config
          echo "CONFIG_TARGET_mediatek_${SUBTARGET}_DEVICE_${DEVICE_NAME}=y" >> .config
          
          # Пакеты
          echo "CONFIG_PACKAGE_luci=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-homeproxy=y" >> .config
          echo "CONFIG_PACKAGE_sing-box=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-homeproxy-ru=y" >> .config
          
          make defconfig
          
          # 4. Финальная проверка перед долгой сборкой
          if ! grep -q "CONFIG_TARGET_mediatek_${SUBTARGET}_DEVICE_${DEVICE_NAME}=y" .config; then
            echo "ERROR: Device string not found in .config after defconfig!"
            echo "Available Keenetic devices in this repo:"
            grep "Device/keenetic" target/linux/mediatek/image/*.mk
            exit 1
          fi
          echo "SUCCESS: Config is valid for $DEVICE_NAME. Starting build..."

      - name: Build
        run: |
          cd source
          make -j$(nproc)

      - name: Output Artifacts
        run: |
          mkdir -p ./output
          find source/bin/targets/mediatek/ -name "*keenetic*" -exec cp {} ./output/ \;
          ls -lh ./output/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt_Keenetic_Final
          path: ./output/*.bin
