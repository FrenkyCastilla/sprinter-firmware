name: Build ImmortalWrt for Sprinter MT7981 Final

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free Disk Space & Install Deps
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gettext git \
            libncurses5-dev libssl-dev python3 python3-setuptools python3-pyelftools \
            python-is-python3 rsync unzip zlib1g-dev libsnmp-dev liblzma-dev libpam0g-dev

      - name: Clone source
        run: |
          git clone --depth 1 https://github.com/hanwckf/immortalwrt-mt798x source
          cd source
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Generate Config
        run: |
          cd source
          # Очистка старого конфига
          rm -f .config
          
          # Жесткое указание устройства Keenetic Hopper/Sprinter
          echo "CONFIG_TARGET_mediatek=y" > .config
          echo "CONFIG_TARGET_mediatek_mt7981=y" >> .config
          echo "CONFIG_TARGET_mediatek_mt7981_DEVICE_keenetic_kn-3810=y" >> .config
          
          # Включаем создание Factory-образа (именно он нужен для U-Boot)
          echo "CONFIG_TARGET_DEVICE_mediatek_mt7981_DEVICE_keenetic_kn-3810_SELECT=y" >> .config
          
          # Пакеты
          echo "CONFIG_PACKAGE_sing-box=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-homeproxy=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-homeproxy-ru=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-ttyd=y" >> .config
          echo "CONFIG_PACKAGE_kmod-nft-tproxy=y" >> .config
          
          make defconfig

      - name: Build
        run: |
          cd source
          make -j$(nproc) || make -j1 V=s

      - name: Organize Artifacts
        run: |
          mkdir -p ./output
          # Теперь ищем всё, что относится к keenetic
          find source/bin/targets/mediatek/mt7981/ -name "*keenetic*" -exec cp {} ./output/ \;
          echo "Найденные файлы:"
          ls -lh ./output/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt_Keenetic_Sprinter_Correct
          path: ./output/*.bin
