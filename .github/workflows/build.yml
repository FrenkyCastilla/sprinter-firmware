name: Build ImmortalWrt Sprinter Official

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Deps
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gettext git \
            libncurses5-dev libssl-dev python3 python3-setuptools python3-pyelftools \
            python-is-python3 rsync unzip zlib1g-dev libsnmp-dev liblzma-dev libpam0g-dev

      - name: Clone Official Source
        run: |
          # Переходим на официальный ImmortalWrt, где есть Keenetic
          git clone --depth 1 -b openwrt-23.05 https://github.com/immortalwrt/immortalwrt source
          cd source
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Hard-Verify Device
        run: |
          cd source
          # Чистим конфиг
          rm -f .config
          
          # Устанавливаем официальный таргет для Hopper/Sprinter
          echo "CONFIG_TARGET_mediatek=y" >> .config
          echo "CONFIG_TARGET_mediatek_filogic=y" >> .config
          echo "CONFIG_TARGET_mediatek_filogic_DEVICE_keenetic_kn-3810=y" >> .config
          
          # Пакеты (твои требования)
          echo "CONFIG_PACKAGE_luci=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-homeproxy=y" >> .config
          echo "CONFIG_PACKAGE_sing-box=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-homeproxy-ru=y" >> .config
          
          make defconfig
          
          # ПРОВЕРКА: Ищем строку именно в этом репо
          if ! grep -q "CONFIG_TARGET_mediatek_filogic_DEVICE_keenetic_kn-3810=y" .config; then
            echo "CRITICAL: Device keenetic_kn-3810 NOT FOUND even in official repo!"
            # Список всех доступных кинетиков для отладки
            find target/linux/mediatek/image/ -name "*.mk" -exec grep "Device/keenetic" {} +
            exit 1
          fi
          echo "AUDIT PASSED: Official profile found. Building..."

      - name: Build
        run: |
          cd source
          make -j$(nproc)

      - name: Output
        run: |
          mkdir -p ./output
          find source/bin/targets/mediatek/filogic/ -name "*keenetic*" -exec cp {} ./output/ \;
          ls -lh ./output/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt_Sprinter_Official
          path: ./output/*.bin
