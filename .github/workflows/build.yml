name: Build ImmortalWrt for Sprinter ARM64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free Disk Space & Install Deps
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gettext git \
            libncurses5-dev libssl-dev python3 python3-setuptools python3-pyelftools \
            python-is-python3 rsync unzip zlib1g-dev libsnmp-dev liblzma-dev libpam0g-dev

      - name: Clone source
        run: |
          git clone --depth 1 https://github.com/hanwckf/immortalwrt-mt798x source
          cd source
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Generate Config
        run: |
          cd source
          echo "CONFIG_TARGET_mediatek=y" > .config
          echo "CONFIG_TARGET_mediatek_filogic=y" >> .config
          echo "CONFIG_TARGET_mediatek_filogic_DEVICE_keenetic_kn-3810=y" >> .config
          
          # Пакеты
          echo "CONFIG_PACKAGE_sing-box=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-homeproxy=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-homeproxy-ru=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-ttyd=y" >> .config
          echo "CONFIG_PACKAGE_kmod-nft-tproxy=y" >> .config
          
          # Принудительная генерация образа
          echo "CONFIG_TARGET_ROOTFS_TARIRE=y" >> .config
          
          make defconfig

      - name: Build
        run: |
          cd source
          # Собираем. Если упадет - на этом шаге будет красный крест.
          make -j$(nproc) || make -j1 V=s

      - name: Check output directory
        run: |
          echo "Listing all generated bin files:"
          find source/bin/targets/ -name "*.bin" || echo "No .bin files found"
          find source/bin/targets/ -name "*.buildinfo" || echo "No buildinfo found"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_Firmware_Sprinter
          path: source/bin/targets/*/*/*.bin # Ищем везде в targets
