name: Build ImmortalWrt Sprinter Final

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Deps
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gettext git \
            libncurses5-dev libssl-dev python3 python3-setuptools python3-pyelftools \
            python-is-python3 rsync unzip zlib1g-dev libsnmp-dev liblzma-dev libpam0g-dev

      - name: Clone source
        run: |
          git clone --depth 1 https://github.com/hanwckf/immortalwrt-mt798x source
          cd source
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Verify Config (2-minute check)
        run: |
          cd source
          rm -f .config
          
          # Жесткая установка профиля Keenetic
          echo "CONFIG_TARGET_mediatek=y" >> .config
          echo "CONFIG_TARGET_mediatek_mt7981=y" >> .config
          echo "CONFIG_TARGET_DEVICE_mediatek_mt7981_DEVICE_keenetic_kn-3810=y" >> .config
          
          # Отключаем мультипрофиль, чтобы не собирать лишний мусор
          echo "CONFIG_TARGET_MULTI_PROFILE=n" >> .config
          
          # Пакеты
          echo "CONFIG_PACKAGE_luci=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-homeproxy=y" >> .config
          echo "CONFIG_PACKAGE_sing-box=y" >> .config
          
          make defconfig
          
          # ПРОВЕРКА: Если профиль kn-3810 не применился, убиваем билд СЕЙЧАС
          if ! grep -q "CONFIG_TARGET_DEVICE_mediatek_mt7981_DEVICE_keenetic_kn-3810=y" .config; then
            echo "ОШИБКА: Профиль Keenetic не применился. Компиляция отменена."
            exit 1
          fi
          echo "КОНФИГ ВЕРЕН: Собираем для KN-3810/3711."

      - name: Build
        run: |
          cd source
          make -j$(nproc)

      - name: Output Artifacts
        run: |
          mkdir -p ./output
          # Ищем файлы только с 'keenetic' в названии
          find source/bin/targets/mediatek/mt7981/ -name "*keenetic*" -exec cp {} ./output/ \;
          ls -lh ./output/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_Keenetic_Final
          path: ./output/*.bin
