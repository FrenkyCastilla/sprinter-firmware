name: Build ImmortalWrt Sprinter Master

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Deps
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gettext git \
            libncurses5-dev libssl-dev python3 python3-setuptools python3-pyelftools \
            python-is-python3 rsync unzip zlib1g-dev libsnmp-dev liblzma-dev libpam0g-dev

      - name: Clone Master Source
        run: |
          # Клонируем Master - тут самая свежая поддержка MT798x
          git clone --depth 1 https://github.com/immortalwrt/immortalwrt source
          cd source
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Scan & Verify (3-min check)
        run: |
          cd source
          # Поиск точной строки устройства во всем дереве MediaTek
          DEVICE_STRING=$(grep -r "Device/keenetic_kn-3810" target/linux/mediatek/image/ | head -n 1 | cut -d/ -f2 | awk '{print $1}')
          
          if [ -z "$DEVICE_STRING" ]; then
            echo "--- ОШИБКА: KN-3810 не найден в Master ---"
            echo "Доступные устройства Keenetic в этом репозитории:"
            grep -r "Device/keenetic" target/linux/mediatek/image/
            exit 1
          fi
          
          echo "Найдено устройство: $DEVICE_STRING"
          
          # Формируем конфиг
          echo "CONFIG_TARGET_mediatek=y" >> .config
          echo "CONFIG_TARGET_mediatek_filogic=y" >> .config
          echo "CONFIG_TARGET_mediatek_filogic_DEVICE_$DEVICE_STRING=y" >> .config
          
          # Пакеты
          echo "CONFIG_PACKAGE_luci=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-homeproxy=y" >> .config
          echo "CONFIG_PACKAGE_sing-box=y" >> .config
          
          make defconfig
          
          if ! grep -q "CONFIG_TARGET_mediatek_filogic_DEVICE_$DEVICE_STRING=y" .config; then
            echo "Ошибка: Конфиг не прошел валидацию."
            exit 1
          fi
          echo "Валидация пройдена. Начинаем сборку."

      - name: Build
        run: |
          cd source
          make -j$(nproc)

      - name: Output
        run: |
          mkdir -p ./output
          find source/bin/targets/mediatek/ -name "*keenetic*" -exec cp {} ./output/ \;
          ls -lh ./output/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt_Sprinter_Master
          path: ./output/*.bin
