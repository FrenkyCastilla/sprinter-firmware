name: Build ImmortalWrt for Sprinter ARM64

on:
  workflow_dispatch: # Запуск вручную

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free Disk Space & Install Deps
        run: |
          # Очистка места (OpenWrt прожорлив)
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          
          sudo apt update
          # Фикс для Ubuntu 24.04: убираем python3-distutils, добавляем setuptools и pyelftools
          sudo apt install -y build-essential clang flex bison g++ gawk gettext git \
            libncurses5-dev libssl-dev python3 python3-setuptools python3-pyelftools \
            python-is-python3 rsync unzip zlib1g-dev libsnmp-dev liblzma-dev libpam0g-dev

      - name: Clone source
        run: |
          git clone --depth 1 https://github.com/hanwckf/immortalwrt-mt798x source
          cd source
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Generate Config
        run: |
          cd source
          # Таргет: Filogic 820 (ARM64). Профиль: Hopper (аналог твоего Спринтера 512MB)
          echo "CONFIG_TARGET_mediatek=y" > .config
          echo "CONFIG_TARGET_mediatek_filogic=y" >> .config
          echo "CONFIG_TARGET_mediatek_filogic_DEVICE_keenetic_kn-3810=y" >> .config
          
          # Пакеты: Sing-box (Reality + Hysteria2) и GUI
          echo "CONFIG_PACKAGE_sing-box=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-homeproxy=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-homeproxy-ru=y" >> .config
          
          # Системные утилиты для удобства
          echo "CONFIG_PACKAGE_luci-app-ttyd=y" >> .config
          echo "CONFIG_PACKAGE_htop=y" >> .config
          echo "CONFIG_PACKAGE_bash=y" >> .config
          echo "CONFIG_PACKAGE_kmod-nft-tproxy=y" >> .config # Важно для прозрачного прокси
          
          make defconfig

      - name: Build
        run: |
          cd source
          # Собираем в несколько потоков, если упадет - перезапуск в один для логов
          make -j$(nproc) || make -j1 V=s

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_Firmware_Sprinter_ARM64
          path: source/bin/targets/mediatek/filogic/*.bin
