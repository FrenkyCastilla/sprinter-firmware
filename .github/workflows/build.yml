name: Build ImmortalWrt Sprinter KN-3711

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Deps
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gettext git \
            libncurses5-dev libssl-dev python3 python3-setuptools python3-pyelftools \
            python-is-python3 rsync unzip zlib1g-dev libsnmp-dev liblzma-dev libpam0g-dev

      - name: Clone Master Source
        run: |
          git clone --depth 1 https://github.com/immortalwrt/immortalwrt source
          cd source
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Verify and Set KN-3711 Config
        run: |
          cd source
          rm -f .config
          
          # Установка таргета строго под твой лог: keenetic_kn-3711
          echo "CONFIG_TARGET_mediatek=y" >> .config
          echo "CONFIG_TARGET_mediatek_filogic=y" >> .config
          echo "CONFIG_TARGET_mediatek_filogic_DEVICE_keenetic_kn-3711=y" >> .config
          
          # Пакеты: Прокси и интерфейс
          echo "CONFIG_PACKAGE_luci=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-homeproxy=y" >> .config
          echo "CONFIG_PACKAGE_sing-box=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-homeproxy-ru=y" >> .config
          
          make defconfig
          
          # Финальная проверка перед стартом
          if ! grep -q "CONFIG_TARGET_mediatek_filogic_DEVICE_keenetic_kn-3711=y" .config; then
            echo "CRITICAL ERROR: Profile keenetic_kn-3711 not applied!"
            exit 1
          fi
          echo "TARGET VERIFIED: Starting build for KN-3711..."

      - name: Build
        run: |
          cd source
          make -j$(nproc)

      - name: Output
        run: |
          mkdir -p ./output
          find source/bin/targets/mediatek/filogic/ -name "*keenetic*" -exec cp {} ./output/ \;
          ls -lh ./output/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt_KN-3711_Final
          path: ./output/*.bin
