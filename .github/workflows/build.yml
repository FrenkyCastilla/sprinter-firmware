name: Build ImmortalWrt Sprinter MT7981 Verified

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Deps
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gettext git \
            libncurses5-dev libssl-dev python3 python3-setuptools python3-pyelftools \
            python-is-python3 rsync unzip zlib1g-dev libsnmp-dev liblzma-dev libpam0g-dev

      - name: Clone source
        run: |
          git clone --depth 1 https://github.com/hanwckf/immortalwrt-mt798x source
          cd source
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Zero-Trust Target Scan & Config
        run: |
          cd source
          # 1. Сканируем мейкфайлы на предмет точного имени Keenetic
          RAW_DEVICE=$(grep -r "Device/keenetic" target/linux/mediatek/image/ | head -n 1 | cut -d/ -f2 | cut -d' ' -f1)
          
          if [ -z "$RAW_DEVICE" ]; then
            echo "ERROR: Keenetic targets NOT FOUND in this repo!"
            ls -R target/linux/mediatek/image/
            exit 1
          fi
          
          echo "Found Device String: $RAW_DEVICE"
          
          # 2. Формируем конфиг на основе найденного
          echo "CONFIG_TARGET_mediatek=y" > .config
          echo "CONFIG_TARGET_mediatek_mt7981=y" >> .config
          echo "CONFIG_TARGET_mediatek_mt7981_DEVICE_$RAW_DEVICE=y" >> .config
          
          # Пакеты
          echo "CONFIG_PACKAGE_luci=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-homeproxy=y" >> .config
          echo "CONFIG_PACKAGE_sing-box=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-homeproxy-ru=y" >> .config
          
          make defconfig
          
          # 3. Валидация перед стартом
          if ! grep -q "CONFIG_TARGET_mediatek_mt7981_DEVICE_$RAW_DEVICE=y" .config; then
            echo "CRITICAL ERROR: defconfig stripped our target!"
            echo "--- DUMPING FULL .CONFIG FOR AUDIT ---"
            cat .config
            exit 1
          fi
          echo "AUDIT PASSED: Starting compilation for $RAW_DEVICE..."

      - name: Build
        run: |
          cd source
          make -j$(nproc)

      - name: Output
        run: |
          mkdir -p ./output
          find source/bin/targets/mediatek/ -name "*keenetic*" -exec cp {} ./output/ \;
          ls -lh ./output/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt_Sprinter_Final
          path: ./output/*.bin
